<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Lark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 400px;
            height: auto;
            margin-bottom: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .tagline {
            font-family: 'Didot', 'Bodoni MT', 'Times New Roman', Georgia, serif;
            font-size: 1.1rem;
            font-style: italic;
            color: #1a1a1a;
            margin-bottom: 2.5rem;
            letter-spacing: 0.05em;
        }

        .store-badges {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .store-badges a img {
            height: 54px;
            transition: opacity 0.2s;
        }

        .store-badges a:hover img {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Daily Lark" class="logo">
        <p class="tagline">... coming soon to an App store near you ...</p>
        <div class="store-badges">
            <a href="https://apps.apple.com/app/id6761080561" aria-label="Download on the App Store">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
            </a>
            <a href="#" aria-label="Get it on Google Play">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
            </a>
        </div>
    </div>
</body>
</html>
