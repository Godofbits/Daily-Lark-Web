<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Lark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: min(400px, 70vw);
            height: auto;
            margin-bottom: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .tagline {
            font-family: 'Didot', 'Bodoni MT', 'Times New Roman', Georgia, serif;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            font-style: italic;
            color: #1a1a1a;
            margin-bottom: 2.5rem;
            letter-spacing: 0.05em;
        }

        .store-badges {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .store-badges a img {
            height: clamp(40px, 8vw, 54px);
            transition: opacity 0.2s;
        }

        .store-badges a:hover img {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Daily Lark" class="logo">
        <p class="tagline">... coming soon to an App store near you ...</p>
        <div class="store-badges">
            <a href="https://apps.apple.com/app/id6761080561" aria-label="Download on the App Store">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
            </a>
            <a href="#" aria-label="Get it on Google Play">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
            </a>
        </div>
        <p class="tagline" style="margin-top: 2.5rem; margin-bottom: 0;">... eta 04/15/26 ...</p>
        <p class="tagline" style="margin-top: 3rem; margin-bottom: 0.5rem; font-style: normal; font-size: clamp(0.7rem, 2vw, 0.85rem); opacity: 0.5;">Daily-Lark.com&trade; &copy; 2026</p>
        <p style="font-size: clamp(0.65rem, 1.5vw, 0.75rem); opacity: 0.4;"><a href="/privacy" style="color: #1a1a1a; text-decoration: none;">Privacy Policy</a> &nbsp;&middot;&nbsp; <a href="/terms" style="color: #1a1a1a; text-decoration: none;">Terms of Service</a></p>
    </div>
</body>
</html>
